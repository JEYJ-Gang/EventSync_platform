openapi: 3.0.3
info:
  title: EventSync API
  description: >
    API REST de la plateforme EventSync — gestion d'événements et engagement
    des participants en temps réel. Remplace les supports statiques par une
    interface dynamique avec planning multi-track, sessions live, Q&R et favoris.
  version: 1.0.0
  contact:
    name: EventSync Team

servers:
  - url: http://localhost:3000
    description: Serveur de production (backend)

tags:
  - name: Events
    description: Gestion et consultation des événements
  - name: Sessions
    description: Gestion et consultation des sessions
  - name: Rooms
    description: Gestion des salles
  - name: Speakers
    description: Gestion et pages publiques des intervenants
  - name: Questions
    description: Système de questions / réponses pendant les sessions live
  - name: Favorites
    description: Itinéraire personnel (favoris côté serveur — synchronisation)

# ---------------------------------------------------------------------------
# SECURITY
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        JWT obtenu via POST /auth/login. Requis uniquement pour les endpoints
        d'administration (organisateurs).

  # -------------------------------------------------------------------------
  # SCHEMAS
  # -------------------------------------------------------------------------
  schemas:

    # ── Auth ────────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@gmail.com
        password:
          type: string
          format: password
          example: "password"

    LoginResponse:
      type: object
      properties:
        access_token:
          type: string
          description: JWT à transmettre dans l'en-tête Authorization
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          description: Durée de validité en secondes
          example: 3600

    # ── Event ───────────────────────────────────────────────────────────────
    EventBase:
      type: object
      required: [title, start_date, end_date, lieu]
      properties:
        title:
          type: string
          example: "Tech Summit 2025"
        description:
          type: string
          nullable: true
          example: "La conférence tech de l'année"
        start_date:
          type: string
          format: date-time
          example: "2025-10-15T08:00:00Z"
        end_date:
          type: string
          format: date-time
          example: "2025-10-17T18:00:00Z"
        lieu:
          type: string
          example: "HEI"

    Event:
      allOf:
        - $ref: '#/components/schemas/EventBase'
        - type: object
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            created_at:
              type: string
              format: date-time
              readOnly: true
            updated_at:
              type: string
              format: date-time
              readOnly: true
            sessions:
              type: array
              readOnly: true
              items:
                $ref: '#/components/schemas/SessionSummary'

    EventList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Event'
        total:
          type: integer
        page:
          type: integer
        per_page:
          type: integer

    # ── Room ────────────────────────────────────────────────────────────────
    RoomBase:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: "Salle NP"

    Room:
      allOf:
        - $ref: '#/components/schemas/RoomBase'
        - type: object
          properties:
            id:
              type: string
              format: uuid
              readOnly: true

    # ── Speaker ─────────────────────────────────────────────────────────────
    SpeakerLink:
      type: object
      required: [label, url]
      properties:
        label:
          type: string
          example: "Twitter"
        url:
          type: string
          format: uri
          example: "https://twitter.com/johndoe"

    SpeakerBase:
      type: object
      required: [full_name, bio, photo_url]
      properties:
        full_name:
          type: string
          example: "Jane Doe"
        bio:
          type: string
          nullable: true
          example: "Ingénieure logicielle et conférencière internationale."
        photo_url:
          type: string
          format: uri
          nullable: true
          example: "https://cdn.eventsync.io/speakers/janedoe.jpg"
        links:
          type: array
          items:
            $ref: '#/components/schemas/SpeakerLink'

    Speaker:
      allOf:
        - $ref: '#/components/schemas/SpeakerBase'
        - type: object
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            sessions:
              type: array
              readOnly: true
              items:
                $ref: '#/components/schemas/SessionSummary'

    SpeakerSummary:
      type: object
      description: Vue réduite d'un intervenant pour les listes et planning
      properties:
        id:
          type: string
          format: uuid
        full_name:
          type: string
        photo_url:
          type: string
          format: uri
          nullable: true

    # ── Session ─────────────────────────────────────────────────────────────
    SessionBase:
      type: object
      required: [title, start_time, end_time, room_id, speaker_ids]
      properties:
        title:
          type: string
          example: "Introduction à l'IA générative"
        description:
          type: string
          nullable: true
        start_time:
          type: string
          format: date-time
          example: "2025-10-15T09:00:00Z"
        end_time:
          type: string
          format: date-time
          example: "2025-10-15T10:00:00Z"
        room_id:
          type: string
          format: uuid
          description: Identifiant de la salle associée
        capacity:
          type: integer
          nullable: true
          description: Capacité indicative (non contraignante)
          example: 200
        speaker_ids:
          type: array
          minItems: 1
          description: Au moins un intervenant requis
          items:
            type: string
            format: uuid

    Session:
      allOf:
        - $ref: '#/components/schemas/SessionBase'
        - type: object
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            event_id:
              type: string
              format: uuid
              readOnly: true
            is_live:
              type: boolean
              readOnly: true
              description: >
                true si l'heure actuelle est comprise entre start_time et end_time
            room:
              $ref: '#/components/schemas/Room'
            speakers:
              type: array
              items:
                $ref: '#/components/schemas/SpeakerSummary'
            questions:
              type: array
              readOnly: true
              items:
                $ref: '#/components/schemas/Question'

    SessionSummary:
      type: object
      description: Vue réduite d'une session (planning, listes)
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        is_live:
          type: boolean
        room:
          $ref: '#/components/schemas/Room'
        speakers:
          type: array
          items:
            $ref: '#/components/schemas/SpeakerSummary'

    SessionList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SessionSummary'
        total:
          type: integer

    # ── Question ────────────────────────────────────────────────────────────
    QuestionCreate:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
          example: "Quels sont les prochains défis pour les LLMs ?"
        author_name:
          type: string
          nullable: true
          description: Optionnel — anonyme si absent
          example: "Alice Martin"

    Question:
      allOf:
        - $ref: '#/components/schemas/QuestionCreate'
        - type: object
          properties:
            id:
              type: string
              format: uuid
              readOnly: true
            session_id:
              type: string
              format: uuid
              readOnly: true
            upvote_count:
              type: integer
              readOnly: true
              default: 0
              example: 12
            created_at:
              type: string
              format: date-time
              readOnly: true

    # ── Errors ──────────────────────────────────────────────────────────────
    Error:
      type: object
      properties:
        code:
          type: string
          example: "NOT_FOUND"
        message:
          type: string
          example: "La ressource demandée est introuvable."

    Error403:
      type: object
      properties:
        code:
          type: string
          example: "FORBIDDEN"
        message:
          type: string
          example: "Accès réservé aux organisateurs authentifiés."

    Error409:
      type: object
      properties:
        code:
          type: string
          example: "SESSION_NOT_LIVE"
        message:
          type: string
          example: "Les questions ne peuvent être soumises que pendant une session live."

  # -------------------------------------------------------------------------
  # RESPONSES RÉUTILISABLES
  # -------------------------------------------------------------------------
  responses:
    Unauthorized:
      description: Token absent ou invalide
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Accès interdit (rôle insuffisant)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error403'
    NotFound:
      description: Ressource introuvable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnprocessableEntity:
      description: Données invalides
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

# ---------------------------------------------------------------------------
# PATHS
# ---------------------------------------------------------------------------
paths:

  # ══════════════════════════════════════════════════════════════════════════
  # AUTH
  # ══════════════════════════════════════════════════════════════════════════
  /auth/login:
    post:
      tags: [Events]
      summary: Authentification organisateur
      description: >
        Retourne un JWT valide permettant d'accéder aux endpoints d'administration.
        Réservé aux organisateurs.
      operationId: loginAdmin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentification réussie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Identifiants incorrects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ══════════════════════════════════════════════════════════════════════════
  # EVENTS
  # ══════════════════════════════════════════════════════════════════════════
  /events:
    get:
      tags: [Events]
      summary: Lister tous les événements (public)
      description: Retourne la liste paginée de tous les événements disponibles.
      operationId: listEvents
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: per_page
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Liste des événements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventList'

    post:
      tags: [Events]
      summary: Créer un événement (admin)
      operationId: createEvent
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventBase'
      responses:
        '201':
          description: Événement créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /events/{eventId}:
    parameters:
      - name: eventId
        in: path
        required: true
        schema: { type: string, format: uuid }

    get:
      tags: [Events]
      summary: Détail d'un événement (public)
      description: >
        Retourne les informations complètes d'un événement, y compris la liste
        des sessions avec indication des sessions live.
      operationId: getEvent
      responses:
        '200':
          description: Détail de l'événement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Events]
      summary: Modifier un événement (admin)
      operationId: updateEvent
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventBase'
      responses:
        '200':
          description: Événement mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    delete:
      tags: [Events]
      summary: Supprimer un événement (admin)
      operationId: deleteEvent
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Événement supprimé
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Planning global multi-track ──────────────────────────────────────────
  /events/{eventId}/schedule:
    parameters:
      - name: eventId
        in: path
        required: true
        schema: { type: string, format: uuid }

    get:
      tags: [Events]
      summary: Planning multi-track d'un événement (public)
      description: >
        Retourne toutes les sessions de l'événement organisées par horaire et
        par salle pour affichage en grille temporelle. Inclut le statut live
        de chaque session.
      operationId: getEventSchedule
      parameters:
        - name: room_id
          in: query
          required: false
          description: Filtrer les sessions par salle (vue planning par salle — §4.7)
          schema:
            type: string
            format: uuid
        - name: date
          in: query
          required: false
          description: Filtrer par date (format ISO 8601)
          schema:
            type: string
            format: date
            example: "2025-10-15"
      responses:
        '200':
          description: Planning des sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionList'
        '404':
          $ref: '#/components/responses/NotFound'

  # ══════════════════════════════════════════════════════════════════════════
  # ROOMS
  # ══════════════════════════════════════════════════════════════════════════
  /events/{eventId}/rooms:
    parameters:
      - name: eventId
        in: path
        required: true
        schema: { type: string, format: uuid }

    get:
      tags: [Rooms]
      summary: Lister les salles d'un événement (public)
      operationId: listRooms
      responses:
        '200':
          description: Liste des salles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Room'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Rooms]
      summary: Créer une salle (admin)
      operationId: createRoom
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomBase'
      responses:
        '201':
          description: Salle créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /events/{eventId}/rooms/{roomId}:
    parameters:
      - name: eventId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: roomId
        in: path
        required: true
        schema: { type: string, format: uuid }

    put:
      tags: [Rooms]
      summary: Modifier une salle (admin)
      operationId: updateRoom
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomBase'
      responses:
        '200':
          description: Salle mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Room'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Rooms]
      summary: Supprimer une salle (admin)
      operationId: deleteRoom
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Salle supprimée
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ══════════════════════════════════════════════════════════════════════════
  # SESSIONS
  # ══════════════════════════════════════════════════════════════════════════
  /events/{eventId}/sessions:
    parameters:
      - name: eventId
        in: path
        required: true
        schema: { type: string, format: uuid }

    get:
      tags: [Sessions]
      summary: Lister les sessions d'un événement (public)
      operationId: listSessions
      parameters:
        - name: room_id
          in: query
          required: false
          description: Filtrer par salle (vue par salle §4.7)
          schema:
            type: string
            format: uuid
        - name: live_only
          in: query
          required: false
          description: Retourner uniquement les sessions en cours
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Liste des sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionList'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Sessions]
      summary: Créer une session (admin)
      operationId: createSession
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionBase'
      responses:
        '201':
          description: Session créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /events/{eventId}/sessions/{sessionId}:
    parameters:
      - name: eventId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: sessionId
        in: path
        required: true
        schema: { type: string, format: uuid }

    get:
      tags: [Sessions]
      summary: Détail d'une session (public)
      description: >
        Retourne toutes les informations d'une session : horaires, salle,
        capacité indicative, intervenants (avec lien vers leur page) et
        questions (uniquement si la session est live, triées par upvotes).
      operationId: getSession
      responses:
        '200':
          description: Détail de la session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Sessions]
      summary: Modifier une session (admin)
      operationId: updateSession
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionBase'
      responses:
        '200':
          description: Session mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    delete:
      tags: [Sessions]
      summary: Supprimer une session (admin)
      operationId: deleteSession
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Session supprimée
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ══════════════════════════════════════════════════════════════════════════
  # QUESTIONS
  # ══════════════════════════════════════════════════════════════════════════
  /events/{eventId}/sessions/{sessionId}/questions:
    parameters:
      - name: eventId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: sessionId
        in: path
        required: true
        schema: { type: string, format: uuid }

    get:
      tags: [Questions]
      summary: Lister les questions d'une session (public)
      description: >
        Retourne les questions triées par nombre de upvotes décroissant.
        Accessible uniquement si la session est live (sinon 409).
      operationId: listQuestions
      responses:
        '200':
          description: Liste des questions triées par upvotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Question'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: La session n'est pas en cours (live)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error409'

    post:
      tags: [Questions]
      summary: Poser une question (public — session live uniquement)
      description: >
        Soumet une nouvelle question. Le champ `author_name` est optionnel
        (permet l'anonymat). La question ne peut être soumise que si la
        session est actuellement live.
      operationId: createQuestion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuestionCreate'
      responses:
        '201':
          description: Question soumise
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: La session n'est pas en cours (live)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error409'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /events/{eventId}/sessions/{sessionId}/questions/{questionId}/upvote:
    parameters:
      - name: eventId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: sessionId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: questionId
        in: path
        required: true
        schema: { type: string, format: uuid }

    post:
      tags: [Questions]
      summary: Upvoter une question (public)
      description: >
        Incrémente le compteur de upvotes d'une question. Sans limite dans
        cette version (pas de contrainte par utilisateur). La session doit
        être live.
      operationId: upvoteQuestion
      responses:
        '200':
          description: Upvote enregistré — retourne la question mise à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Question'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: La session n'est pas en cours (live)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error409'

  # ══════════════════════════════════════════════════════════════════════════
  # SPEAKERS
  # ══════════════════════════════════════════════════════════════════════════
  /speakers:
    get:
      tags: [Speakers]
      summary: Lister tous les intervenants (public)
      operationId: listSpeakers
      responses:
        '200':
          description: Liste des intervenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Speaker'

    post:
      tags: [Speakers]
      summary: Créer un intervenant (admin)
      operationId: createSpeaker
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpeakerBase'
      responses:
        '201':
          description: Intervenant créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Speaker'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /speakers/{speakerId}:
    parameters:
      - name: speakerId
        in: path
        required: true
        schema: { type: string, format: uuid }

    get:
      tags: [Speakers]
      summary: Page publique d'un intervenant (public)
      description: >
        Retourne le profil complet de l'intervenant : photo, biographie,
        liens externes et liste des sessions auxquelles il participe
        (avec indication live).
      operationId: getSpeaker
      responses:
        '200':
          description: Profil de l'intervenant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Speaker'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Speakers]
      summary: Modifier un intervenant (admin)
      operationId: updateSpeaker
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpeakerBase'
      responses:
        '200':
          description: Intervenant mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Speaker'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

    delete:
      tags: [Speakers]
      summary: Supprimer un intervenant (admin)
      operationId: deleteSpeaker
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Intervenant supprimé
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /speakers/{speakerId}/sessions:
    parameters:
      - name: speakerId
        in: path
        required: true
        schema: { type: string, format: uuid }

    get:
      tags: [Speakers]
      summary: Sessions d'un intervenant (public)
      description: >
        Retourne la liste des sessions associées à un intervenant,
        avec indication live. Utile pour la page publique de l'intervenant.
      operationId: listSpeakerSessions
      responses:
        '200':
          description: Sessions de l'intervenant
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionSummary'
        '404':
          $ref: '#/components/responses/NotFound'

  # ══════════════════════════════════════════════════════════════════════════
  # FAVORITES (itinéraire personnel — sync optionnelle)
  # ══════════════════════════════════════════════════════════════════════════
  # Note : La spec prévoit un stockage local (localStorage). Ces endpoints
  # sont facultatifs mais documentés ici pour une éventuelle synchronisation
  # côté serveur ou consultation cross-device.
  /me/favorites:
    get:
      tags: [Favorites]
      summary: Lister ses sessions favorites
      description: >
        Retourne les sessions sauvegardées dans l'itinéraire personnel du
        participant. Dans la version initiale, ces données sont stockées
        côté navigateur (localStorage) ; ces endpoints préparent une
        synchronisation serveur future.
      operationId: listFavorites
      responses:
        '200':
          description: Liste des sessions favorites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SessionSummary'

  /me/favorites/{sessionId}:
    parameters:
      - name: sessionId
        in: path
        required: true
        schema: { type: string, format: uuid }

    put:
      tags: [Favorites]
      summary: Ajouter une session aux favoris
      operationId: addFavorite
      responses:
        '204':
          description: Session ajoutée aux favoris
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Favorites]
      summary: Retirer une session des favoris
      operationId: removeFavorite
      responses:
        '204':
          description: Session retirée des favoris
        '404':
          $ref: '#/components/responses/NotFound'